name: Build & deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Verify pricing.js is in sync with pricing.yaml
        run: |
          node scripts/gen-pricing.mjs
          if ! git diff --quiet -- assets/pricing.js; then
            echo "::error::assets/pricing.js is out of sync with pricing.yaml. Run 'npm run gen-pricing' and commit the result."
            git --no-pager diff -- assets/pricing.js
            exit 1
          fi
          echo "pricing.js is in sync ✓"

      - name: Assemble static site (only the files the page serves)
        run: |
          mkdir -p _site
          cp index.html index-en.html .nojekyll _site/
          cp -r assets _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
